<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Diego Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Popup de vídeo -->
    <div class="popup-overlay" id="video-popup" role="dialog" aria-modal="true" aria-label="Vídeo">
        <div class="popup-box">
            <button class="popup-close" id="close-popup" aria-label="Fechar">&#x2715;</button>
            <button class="popup-mute" id="mute-btn" aria-label="Silenciar">🔊</button>
            <video class="popup-video" playsinline>
                <source src="video/video2.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <main class="container">

        <header class="hero">

            <!-- Topbar: perfil 2 esquerda | compartilhar direita -->
            <div class="topbar">
                <button class="topbar__perfil" id="open-popup" aria-label="Abrir vídeo">
                    <img src="img/perfil 2.png" alt="Perfil 2">
                </button>
                <button class="topbar__share" id="share-btn" aria-label="Compartilhar">
                    <img src="img/compartilhar.png" alt="Compartilhar">
                </button>
            </div>

            <picture>
                <source media="(min-width: 769px)" srcset="img/pc.png">
                <img class="hero__photo" src="img/foto1.webp" alt="Don Diego">
            </picture>

            <h1 class="hero__welcome">
                Bem-vindo(a)<br> <span class="ajudar">os links irão ajudar </span>
                <span class="arrow-down">&#42780;</span>
            </h1>

        </header>

        <section class="panel" aria-label="Links">
            <div class="cards">
                <a class="link" href="https://wa.me/5582994095090?text=Ol%C3%A1!%20Vim%20pelo%20instagram%20e%20tenho%20interesse%20em%20comprar" target="_blank" rel="noopener noreferrer">
                    <img src="img/img1.webp" alt="imagem de um botão">
                </a>
                <a class="link" href="https://dondiegostyle.com.br/" target="_blank" rel="noopener noreferrer">
                    <img src="img/img2.webp" alt="imagem de um botão">
                </a>
                <a class="link" href="https://donstyle.com.br/" target="_blank" rel="noopener noreferrer">
                    <img src="img/img3.webp" alt="imagem de um botão">
                </a>
            </div>


        </section>

        <div class="social">
           
            <a class="social__btn" href="https://www.instagram.com/dondiegostyle/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

                </svg>
            </a>
           
             <a class="social__btn" href="https://www.tiktok.com/@dondiegostyle" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

                </svg>
            </a>
        </div>

        <section class="footer">
           
            <p class="footer__work"><a href="https://elielsonjr.notion.site/165732dc06d68037a8d8d66eb3a749bd?pvs=105" target="_blank" rel="noopener noreferrer">Trabalhe conosco</a></p>
             <p class="footer__text">©2026 Don Diego Style</p>
        </section>

           
    </main>

    <script src="script.js"></script>
</body>
</html>
